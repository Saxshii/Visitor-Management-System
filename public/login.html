<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <link rel="stylesheet" href="/css/styling.css">
</head>
<body>
  <main>
  <div id="container">
    <h2 id="form-heading">Login</h2>
    <div id="error-msg" style="color:red;margin-bottom:10px;display:none;"></div>

    <form id="login-form">
      <label for="email">Email:</label>  
      <input type="email" id="email" placeholder="Enter your email" name="email" required><br>
      <label for="pass">Password:</label>
      <input type="password" id="pass" placeholder="Enter your password" name="password" required><br>
      <button type="submit">Login</button>
      <p class="forgot"><a href="#">Forgot Password?</a></p>
      <p>Create an Account <a href="signup.html">Sign up</a></p>
    </form>
  </div>
  </main>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pass').value.trim();
      const errEl = document.getElementById('error-msg');

      if (!email || !password) {
        errEl.textContent = 'Please enter email and password.';
        errEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('rites_user', JSON.stringify({ name: data.name, email: data.email }));
          window.location.href = '/dashboard.html';
        } else {
          errEl.textContent = data.message || 'Login failed.';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Server error. Please try again.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
