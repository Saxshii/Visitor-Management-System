<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="css/common.css" rel="stylesheet">
    <link rel="stylesheet" href="css/report.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
<header class="header">
  <div class="left-section">
    <div class="logo-block">
    <img src="rites_logo2.png" alt="RITES Logo" class="logo-img">
    <p class="gov-text"><b>A Government of India Enterprise</b></p>
    </div>
  </div>

  <div class="center-section">
    <h2>VISITOR MANAGEMENT SYSTEM</h2>
  </div>

  <div class="right-section">
    <button class="user-button">shikhar ⏷</button>
  </div>
</header>

<main>
  <div class="container">

    <div class="heading-container">  
      <div class="form-title-bar">
        <p class="form-title">
          Today's Visitor Report
        </p>
        <span class="heading-icons">
          <i class="fas fa-home"></i>
          <i class="fa-solid fa-file"></i>
        </span>
      </div>
    </div>

    <div class="table-controls">
  <div class="entries">
    Show
    <select name="entries" id="entries">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="25">25</option>
    </select>
    entries
  </div>
  <div class="search-box">
    Search: <input type="text" id="search">
  </div>
</div>

<div class="table-wrapper">
  <table class="visitor-table">
    <thead>
      <tr>
        <th>S.No.</th>
        <th>Mobile Number</th>
        <th>Visitor Name</th>
        <th>RITES Officer Name</th>
        <th>Generate Pass</th>
        <th>Punch Out</th>
      </tr>
    </thead>
    <tbody>
      
    </tbody>
  </table>
</div>

<div class="pagination-footer">
  Showing 1 to 2 of 2 entries
  <div class="pagination">
    <button>First</button>
    <button>Previous</button>
    <button class="active">1</button>
    <button>Next</button>
    <button>Last</button>
  </div>
</div>

  </div> 

</main>

<script src="js/report.js"></script>

</body>
</html>
