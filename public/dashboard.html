<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITES - Visitor Management System</title>
    <link href="css/common.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      .nav-auth { display: flex; align-items: center; gap: 10px; }
      .btn-login {
        background: transparent; color: white; border: 2px solid white;
        padding: 7px 18px; font-size: 14px; border-radius: 20px; cursor: pointer;
        font-weight: 600; transition: background 0.2s; text-decoration: none;
      }
      .btn-login:hover { background: rgba(255,255,255,0.15); }
      .btn-signup {
        background: white; color: #02711a; border: 2px solid white;
        padding: 7px 18px; font-size: 14px; border-radius: 20px; cursor: pointer;
        font-weight: 700; transition: opacity 0.2s; text-decoration: none;
      }
      .btn-signup:hover { opacity: 0.85; }
      .user-dropdown { position: relative; }
      .dropdown-menu {
        display: none; position: absolute; right: 0; top: 40px;
        background: white; border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        min-width: 130px; z-index: 100; overflow: hidden;
      }
      .dropdown-menu.open { display: block; }
      .logout-btn {
        display: block; width: 100%; text-align: left; padding: 11px 18px;
        font-size: 14px; color: #c0392b; cursor: pointer;
        border: none; background: none;
      }
      .logout-btn:hover { background: #fff0f0; }
      .cards { position: relative; }
      .lock-badge { position: absolute; top: 8px; right: 10px; font-size: 18px; color: #aaa; }
      .cards.locked { opacity: 0.7; }
    </style>
</head>
<body>

<header class="header">
  <div class="left-section">
    <div class="logo-block">
      <img src="rites_logo2.png" alt="RITES Logo" class="logo-img">
      <p class="gov-text"><b>A Government of India Enterprise</b></p>
    </div>
  </div>
  <div class="center-section">
    <h2>VISITOR MANAGEMENT SYSTEM</h2>
  </div>
  <div class="right-section" id="nav-right"></div>
</header>

<main>
  <div class="card-container">
    <a href="gatepass.html" class="cards" id="card-gatepass">
      <i class="material-icons">confirmation_number</i>
      <h3>Generate Gate Pass</h3>
    </a>
    <a href="today-report.html" class="cards">
      <i class="material-icons">groups</i>
      <h3>Today's Visitors</h3>
    </a>
    <a href="summary-report.html" class="cards">
      <i class="material-icons">import_contacts</i>
      <h3>Summary Report</h3>
    </a>
  </div>
</main>

<script>
  const navRight = document.getElementById('nav-right');
  const gatepassCard = document.getElementById('card-gatepass');
  const user = JSON.parse(localStorage.getItem('rites_user') || 'null');

  if (user) {
    navRight.innerHTML = `
      <div class="user-dropdown">
        <button class="user-button" id="userBtn">${user.name} ⏷</button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </div>`;
    document.getElementById('userBtn').addEventListener('click', () => {
      document.getElementById('dropdownMenu').classList.toggle('open');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('rites_user');
      location.reload();
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.user-dropdown'))
        document.getElementById('dropdownMenu')?.classList.remove('open');
    });
  } else {
    navRight.innerHTML = `
      <div class="nav-auth">
        <a href="login.html" class="btn-login">Login</a>
        <a href="signup.html" class="btn-signup">Sign Up</a>
      </div>`;
    gatepassCard.classList.add('locked');
    const lockIcon = document.createElement('span');
    lockIcon.className = 'lock-badge material-icons';
    lockIcon.textContent = 'lock';
    gatepassCard.appendChild(lockIcon);
    gatepassCard.addEventListener('click', (e) => {
      e.preventDefault();
      alert('Please login to generate a gate pass.');
      window.location.href = 'login.html';
    });
  }
</script>
</body>
</html>
