<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="/css/styling.css" rel="stylesheet">
</head>
<body>
  <div id="container">
    <h2 id="form-heading">Sign Up</h2>
    <div id="error-msg" style="color:red;margin-bottom:10px;display:none;"></div>
    
    <form id="signup-form">
      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="Enter your full name" name="name" required><br>
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" name="email" required><br>
      <label for="pass">Password:</label>
      <input type="password" id="pass" placeholder="Enter your password" name="password" required><br>
      <label for="confirm">Confirm Password:</label>
      <input type="password" id="confirm" placeholder="Re-enter password" name="confirm" required><br>
      <button type="submit">Sign Up</button>
      <p>Already have an account? <a href="login.html">Log in</a></p>
    </form>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pass').value;
      const confirm = document.getElementById('confirm').value;
      const errEl = document.getElementById('error-msg');

      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block'; return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block'; return;
      }

      try {
        const res = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, confirm })
        });
        const data = await res.json();
        if (data.success) {
          alert('Signup successful! Please login.');
          window.location.href = '/login.html';
        } else {
          errEl.textContent = data.message || 'Signup failed.';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Server error. Please try again.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
