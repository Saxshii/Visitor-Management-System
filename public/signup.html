<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="/css/styling.css" rel="stylesheet">
</head>
<body>
  <div id="container">
    <h2 id="form-heading">Sign Up</h2> 
    
    <form id="signup-form" action="http://localhost:3000/signup" method="POST">
      <label for="name">Full Name:</label>
      <input type="text" id="name" placeholder="Enter your full name" name="name" required><br>

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" name="email" required><br>

      <label for="pass">Password:</label>
      <input type="password" id="pass" placeholder="Enter your password" name="password" required><br>

      <label for="confirm">Confirm Password:</label>
      <input type="password" id="confirm" placeholder="Re-enter password" name="confirm" required><br>

      <button type="submit">Sign Up</button>
      <p>Already have an account? <a href="login.html">Log in</a></p>
    </form>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
